name: Construit y subir imagen Docker
on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Verificar código
      uses: actions/checkout@v4

    - name: Inicio de sesión en Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }} 

    - name: Construir imagen Docker
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node_api:latest .

    - name: Hacer Push de la imagen Docker
      run: docker push ${{ secrets.DOCKER_USERNAME }}/node_api:latest